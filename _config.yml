  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
index_generator:
  path: ''
  per_page: 10
  order_by: '-date'
default_category: uncategorized
category_map: null
tag_map: null
meta_generator: true
date_format: MM-DD-YYYY
time_format: HH:mm:ss
updated_option: mtime
per_page: 10
pagination_dir: page
include: null
exclude: null
ignore: null
theme: solitude
deploy:
  type: git
  repo: git@github.com:theporoc/theporoc.github.io.git
  branch: main
# 404 page
# 404 页面
errorpage:
  img: /img/404.avif # 图片
  text: Page Not Found # 报错内容
  recommendList: true # 是否展示推荐文章列表